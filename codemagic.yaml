workflows:
  android-test:
    name: Gourmet Pastries Android (test APK)
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 20
      java: 17
    scripts:
      - name: Install dependencies
        script: npm install
      - name: Expo prebuild (generate android project)
        script: npx expo prebuild --platform android --no-install
      - name: Set Android SDK location
        script: echo "sdk.dir=$ANDROID_SDK_ROOT" > "$CM_BUILD_DIR/android/local.properties"
      - name: Build installable release APK
        script: |
          cd android
          ./gradlew assembleRelease
    artifacts:
      - android/app/build/outputs/**/*.apk
